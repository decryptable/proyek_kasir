name: Build Native Executables

on:
  push:
    tags:
      - 'build-*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile Linux executable
        run: dart compile exe bin/main.dart -o kasir-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: kasir-linux
          path: kasir-linux

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile Windows executable
        run: dart compile exe bin/main.dart -o kasir-windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: kasir-windows
          path: kasir-windows.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile macOS executable
        run: dart compile exe bin/main.dart -o kasir-macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kasir-macos
          path: kasir-macos

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: kasir-linux
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: kasir-windows
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: kasir-macos
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kasir-linux
            dist/kasir-windows.exe
            dist/kasir-macos
